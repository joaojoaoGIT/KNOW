<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Área do Aluno — KNOW</title>
<link rel="icon" href="images/logo-know.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app" id="app"></div>
<script src="js/partials.js"></script>
<script>
const u = JSON.parse(localStorage.getItem('know_user')||'null');
if(!u){ location.href='login.html'; }

const courses = [
  {id:'inf', name:'Técnico em Informática', progress:62, modules:[
    {t:'Introdução à Programação', v:'dQw4w9WgXcQ', done:true},
    {t:'HTML e CSS Essenciais', v:'pQN-pnXPaVg', done:true},
    {t:'JavaScript Moderno', v:'PkZNo7MFNFg', done:false},
    {t:'Banco de Dados', v:'HXV3zeQKqGY', done:false},
  ]},
  {id:'enf', name:'Técnico em Enfermagem', progress:30, modules:[
    {t:'Anatomia Básica', v:'4F4qzPbcFiA', done:true},
    {t:'Sinais Vitais', v:'b1H3xO3x_Js', done:false},
    {t:'Primeiros Socorros', v:'eIho2S0ZahI', done:false},
  ]},
  {id:'adm', name:'Técnico em Administração', progress:15, modules:[
    {t:'Fundamentos de Gestão', v:'jNQXAC9IVRw', done:false},
    {t:'Marketing Digital', v:'lTTajzrSkCw', done:false},
  ]}
];

const params = new URLSearchParams(location.search);
const view = params.get('view') || 'dash';
const cid = params.get('c');

function renderDash(){
  return `
  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb">Área do Aluno</div>
      <h1>Olá, ${u.name.split(' ')[0]} 👋</h1>
      <p>Acompanhe seus cursos, progresso e materiais.</p>
    </div>
  </section>
  <section><div class="container">
    <div class="dash-grid">
      <div class="dash-card"><div class="icon"><i class="fa-solid fa-book-open"></i></div><strong>${courses.length}</strong><span>Cursos ativos</span></div>
      <div class="dash-card"><div class="icon"><i class="fa-solid fa-chart-line"></i></div><strong>${Math.round(courses.reduce((s,c)=>s+c.progress,0)/courses.length)}%</strong><span>Progresso médio</span></div>
      <div class="dash-card"><div class="icon"><i class="fa-solid fa-certificate"></i></div><strong>2</strong><span>Certificados</span></div>
      <div class="dash-card"><div class="icon"><i class="fa-solid fa-clock"></i></div><strong>34h</strong><span>Tempo de estudo</span></div>
    </div>
    <h2 style="margin-bottom:18px">Meus cursos</h2>
    <div class="cards">
      ${courses.map(c=>`
        <article class="card">
          <div class="card__body">
            <span class="badge">${c.modules.length} módulos</span>
            <h3 style="margin-top:10px">${c.name}</h3>
            <div class="progress"><div style="width:${c.progress}%"></div></div>
            <p style="font-size:.82rem">${c.progress}% concluído</p>
            <a class="card__link" href="?view=course&c=${c.id}">Continuar <i class="fa-solid fa-arrow-right"></i></a>
          </div>
        </article>`).join('')}
    </div>
    <div style="margin-top:30px"><button class="btn btn-ghost" onclick="localStorage.removeItem('know_user');location.href='index.html'"><i class="fa-solid fa-right-from-bracket"></i> Sair</button></div>
  </div></section>`;
}

function renderCourse(){
  const c = courses.find(x=>x.id===cid) || courses[0];
  return `
  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="area-aluno.html">Área do Aluno</a> / ${c.name}</div>
      <h1>${c.name}</h1>
      <p>Progresso: ${c.progress}% — continue de onde parou.</p>
    </div>
  </section>
  <section><div class="container">
    ${c.modules.map((m,i)=>`
      <div class="module">
        <div class="module__head">
          <h3><i class="fa-solid ${m.done?'fa-circle-check':'fa-circle-play'}" style="color:var(--primary);margin-right:8px"></i> Módulo ${i+1}: ${m.t}</h3>
          <span class="badge">${m.done?'Concluído':'Em andamento'}</span>
        </div>
        <div class="video-frame"><iframe src="https://www.youtube.com/embed/${m.v}" title="${m.t}" allowfullscreen></iframe></div>
        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn btn-ghost" href="#"><i class="fa-solid fa-file-pdf"></i> Material PDF</a>
          <a class="btn btn-ghost" href="#"><i class="fa-solid fa-clipboard-question"></i> Quiz</a>
        </div>
      </div>`).join('')}
    <a class="btn btn-primary" href="area-aluno.html"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
  </div></section>`;
}

mountShell('area-aluno.html','Área do Aluno', view==='course'?renderCourse():renderDash());
</script>
<script src="js/app.js"></script>
</body>
</html>
