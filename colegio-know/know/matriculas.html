<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matrículas — Colégio Técnico KNOW</title>
<link rel="icon" href="images/logo-know.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app" id="app"></div>
<script src="js/partials.js"></script>
<script>
const HTML = `
<section class="page-hero">
  <div class="container"><div class="breadcrumb"><a href="index.html">Início</a> / Matrículas</div>
    <h1>Matrículas abertas</h1>
    <p>Garanta sua vaga em um dos cursos técnicos KNOW.</p>
  </div>
</section>
<section>
  <div class="container">
    <div class="steps" style="margin-bottom:60px">
      <div class="step"><div class="step__num">1</div><h3>Escolha o curso</h3><p>Encontre a trilha ideal para sua carreira.</p></div>
      <div class="step"><div class="step__num">2</div><h3>Cadastre-se</h3><p>Preencha o formulário ao lado.</p></div>
      <div class="step"><div class="step__num">3</div><h3>Atendimento</h3><p>Nossa equipe entrará em contato.</p></div>
      <div class="step"><div class="step__num">4</div><h3>Inicie!</h3><p>Bem-vindo(a) à KNOW.</p></div>
    </div>
    <div class="contact-grid">
      <div data-aos="fade-right">
        <h2>Pronto para começar?</h2>
        <p style="margin-top:14px">Preencha o formulário ao lado e nossa equipe entrará em contato em até 24 horas para tirar todas as suas dúvidas e auxiliar no processo de matrícula.</p>
        <div class="values" style="grid-template-columns:1fr">
          <div class="value"><i class="fa-solid fa-shield-halved"></i><strong>Processo 100% seguro</strong><p>Seus dados são protegidos.</p></div>
          <div class="value"><i class="fa-solid fa-headset"></i><strong>Atendimento humanizado</strong><p>Equipe especializada à sua disposição.</p></div>
        </div>
      </div>
      <form class="form" id="leadForm" data-aos="fade-left" novalidate>
        <h3>Formulário de interesse</h3>
        <div class="field" data-field="nome"><label>Nome completo</label><input name="nome" type="text" placeholder="Seu nome"><span class="err">Informe seu nome</span></div>
        <div class="field" data-field="idade"><label>Idade</label><input name="idade" type="number" placeholder="Sua idade"><span class="err">Idade inválida</span></div>
        <div class="field" data-field="email"><label>E-mail</label><input name="email" type="email" placeholder="seuemail@exemplo.com"><span class="err">E-mail inválido</span></div>
        <div class="field" data-field="curso"><label>Curso de interesse</label>
          <select name="curso"><option value="">Selecione</option>
            <option>Técnico em Informática</option>
            <option>Técnico em Enfermagem</option>
            <option>Técnico em Administração</option>
          </select><span class="err">Selecione um curso</span>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center" type="submit"><i class="fa-solid fa-paper-plane"></i> Solicitar matrícula</button>
      </form>
    </div>
  </div>
</section>
` + renderFooter();
mountShell('matriculas.html','Matrículas', HTML);
</script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="js/app.js"></script>
</body>
</html>
